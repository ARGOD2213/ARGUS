name: "Trigger Codex Execution"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Review issue number (optional, for traceability)"
        required: false
      action_note:
        description: "What Codex should do now"
        required: true
        default: "Apply all P1 first, then P2. Commit and push."

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append trigger queue
        env:
          ACTOR: ${{ github.actor }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          ACTION_NOTE: ${{ github.event.inputs.action_note }}
        run: |
          set -euo pipefail
          mkdir -p docs
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ISSUE_VALUE="${ISSUE_NUMBER:-N/A}"

          {
            echo "## $NOW_UTC"
            echo "- Triggered By: $ACTOR"
            echo "- Issue: #$ISSUE_VALUE"
            echo "- Action: $ACTION_NOTE"
            echo ""
          } >> docs/CODEX_TRIGGER_QUEUE.md

          {
            echo "# Codex Trigger Latest"
            echo ""
            echo "- Timestamp UTC: $NOW_UTC"
            echo "- Triggered By: $ACTOR"
            echo "- Issue: #$ISSUE_VALUE"
            echo "- Action: $ACTION_NOTE"
          } > docs/CODEX_TRIGGER_LATEST.md

      - name: Commit and push trigger
        run: |
          set -euo pipefail
          git config user.name "argodreign-bot"
          git config user.email "argodreign-bot@users.noreply.github.com"
          git add docs/CODEX_TRIGGER_QUEUE.md docs/CODEX_TRIGGER_LATEST.md
          if git diff --cached --quiet; then
            echo "No trigger changes."
            exit 0
          fi
          git commit -m "chore: trigger codex execution request"
          git push

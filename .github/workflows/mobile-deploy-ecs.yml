name: Mobile Deploy To ECS

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: string
      ecs_cluster:
        description: "ECS cluster name"
        required: true
        default: "iot-cluster"
        type: string
      ecs_service:
        description: "ECS service name"
        required: true
        default: "iot-api"
        type: string
      ecr_repo:
        description: "ECR repository name"
        required: true
        default: "iot-alert-engine"
        type: string
      image_tag:
        description: "Image tag (example: v2, release-2026-03-10)"
        required: true
        default: "latest"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ inputs.ecr_repo }}"
          TAG="${{ inputs.image_tag }}"
          IMAGE_URI="$REGISTRY/$REPO:$TAG"

          echo "Building image: $IMAGE_URI"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Trigger ECS rolling deployment
        shell: bash
        run: |
          set -euo pipefail
          aws ecs update-service \
            --region "${{ inputs.aws_region }}" \
            --cluster "${{ inputs.ecs_cluster }}" \
            --service "${{ inputs.ecs_service }}" \
            --force-new-deployment > /dev/null

      - name: Show deployment summary
        shell: bash
        run: |
          set -euo pipefail
          STATUS_JSON="$(aws ecs describe-services \
            --region "${{ inputs.aws_region }}" \
            --cluster "${{ inputs.ecs_cluster }}" \
            --services "${{ inputs.ecs_service }}" \
            --output json)"

          echo "$STATUS_JSON" > ecs-deploy-status.json
          RUNNING="$(echo "$STATUS_JSON" | jq -r '.services[0].runningCount')"
          DESIRED="$(echo "$STATUS_JSON" | jq -r '.services[0].desiredCount')"
          TASK_DEF="$(echo "$STATUS_JSON" | jq -r '.services[0].taskDefinition')"
          IMAGE_URI="${{ steps.build-image.outputs.image_uri }}"

          {
            echo "## Mobile Deploy Result"
            echo ""
            echo "- Image: $IMAGE_URI"
            echo "- Task definition: $TASK_DEF"
            echo "- Desired count: $DESIRED"
            echo "- Running count: $RUNNING"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deployment status artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecs-deploy-status
          path: ecs-deploy-status.json

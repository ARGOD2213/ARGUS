name: Mobile CloudWatch Logs Snapshot

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region"
        required: true
        default: "ap-south-1"
        type: string
      log_group:
        description: "CloudWatch log group name"
        required: true
        default: "/ecs/iot-api"
        type: string
      filter_pattern:
        description: "Optional CloudWatch filter pattern"
        required: false
        default: ""
        type: string
      lookback_minutes:
        description: "How many minutes back to search"
        required: true
        default: "120"
        type: string
      limit:
        description: "Max log events to fetch"
        required: true
        default: "200"
        type: string

jobs:
  logs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Fetch log events
        shell: bash
        run: |
          set -euo pipefail
          REGION="${{ inputs.aws_region }}"
          GROUP="${{ inputs.log_group }}"
          FILTER="${{ inputs.filter_pattern }}"
          LIMIT="${{ inputs.limit }}"
          LOOKBACK="${{ inputs.lookback_minutes }}"

          START_MS=$(( $(date +%s) * 1000 - LOOKBACK * 60 * 1000 ))

          if [[ -n "$FILTER" ]]; then
            aws logs filter-log-events \
              --region "$REGION" \
              --log-group-name "$GROUP" \
              --start-time "$START_MS" \
              --filter-pattern "$FILTER" \
              --limit "$LIMIT" \
              --output json > logs-raw.json
          else
            aws logs filter-log-events \
              --region "$REGION" \
              --log-group-name "$GROUP" \
              --start-time "$START_MS" \
              --limit "$LIMIT" \
              --output json > logs-raw.json
          fi

          jq -r '.events[] | "[\(.timestamp)] \(.message)"' logs-raw.json > logs.txt
          COUNT="$(jq '.events | length' logs-raw.json)"

          {
            echo "## Mobile CloudWatch Logs Snapshot"
            echo ""
            echo "- Log group: $GROUP"
            echo "- Lookback minutes: $LOOKBACK"
            echo "- Events fetched: $COUNT"
            if [[ -n "$FILTER" ]]; then
              echo "- Filter: \`$FILTER\`"
            fi
            echo ""
            echo "### Last 30 lines"
            echo '```'
            tail -n 30 logs.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload logs artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudwatch-logs-snapshot
          path: |
            logs-raw.json
            logs.txt
